---
layout: default
nav: projects
permalink: /projects/
title: Projects
---
<section class="page-pad">
  <h1 class="page-title">Projects</h1>
  <p class="section-intro">Selected work in test automation, tooling, and quality infrastructure.</p>
  <div class="cards">
    {% for p in site.data.projects %}
    <div class="card">
      <div class="card-head">
        <h3>{{ p.name }}</h3>
        <span class="tag">{{ p.tag }}</span>
      </div>
      <p>{{ p.body }}</p>
      <div class="stack">
        {% for s in p.stack %}<span>{{ s }}</span>{% endfor %}
      </div>
    </div>
    {% endfor %}
  </div>
</section>
