<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title and page.nav != 'home' %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }} — {{ site.tagline }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <a class="brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>
      <nav class="nav">
        <a href="{{ '/' | relative_url }}"{% if page.nav == 'home' %} class="active"{% endif %}>Home</a>
        <a href="{{ '/work/' | relative_url }}"{% if page.nav == 'work' %} class="active"{% endif %}>Work</a>
        <a href="{{ '/projects/' | relative_url }}"{% if page.nav == 'projects' %} class="active"{% endif %}>Projects</a>
        <a href="{{ '/blog/' | relative_url }}"{% if page.nav == 'blog' %} class="active"{% endif %}>Writing</a>
      </nav>
    </div>
  </header>

  <main class="wrap">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <span class="copy">© {{ 'now' | date: "%Y" }} {{ site.author }}</span>
      <div class="links">
        <a href="{{ site.linkedin }}" target="_blank" rel="noopener">LinkedIn</a>
        <a href="mailto:{{ site.email }}">Email</a>
        <a href="{{ site.github }}" target="_blank" rel="noopener">GitHub</a>
      </div>
    </div>
  </footer>
</body>
</html>
